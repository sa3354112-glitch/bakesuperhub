<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-3">
<script>
let p = prompt("🔐 Admin Password Daalo:");
if(p !== "Saqib@2026"){
 alert("❌ Galat Password! Aap admin nahi ho");
 window.location.href = "index.html";
}
</script>
<h1 class="text-2xl font-bold text-orange-500">🍔 BAKE SUPER HUB CONTROL</h1>
<p class="text-xs text-gray-400 mb-4">Jo product chahiye rakho, jo nahi chahiye DELETE dabao</p>

<!-- ADD FORM -->
<div class="bg-zinc-900 p-3 rounded-xl mb-4 border border-zinc-800">
<h2 class="font-bold text-orange-400 mb-2">➕ Naya Product Add Karo</h2>
<input id="n" placeholder="Name - Jaise: Chicken Burger" class="w-full p-2 mb-2 rounded bg-black border border-zinc-700 text-white">
<div class="flex gap-2 mb-2">
<input id="pr" type="number" placeholder="Price - 59" class="flex-1 p-2 rounded bg-black border border-zinc-700">
<select id="cat" class="flex-1 p-2 rounded bg-black border border-zinc-700">
<option value="burgers">Burger</option>
<option value="pizzas">Pizza</option>
</select>
</div>
<input id="img" placeholder="Image link - khali chhodoge to auto ayega" class="w-full p-2 mb-2 rounded bg-black border border-zinc-700 text-xs">
<button onclick="add()" class="w-full bg-orange-500 text-black font-bold py-2 rounded">ADD KARO</button>
</div>

<!-- BULK DELETE -->
<button onclick="keepOnlyBurgerPizza()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl mb-4">🗑️ BAKERY HATAO - SIRF BURGER PIZZA RAKHO (1 CLICK)</button>

<!-- SEARCH -->
<input id="search" oninput="render()" placeholder="Search - Burger likho..." class="w-full p-2 mb-3 rounded bg-zinc-900 border border-zinc-700">

<!-- LIST -->
<div id="list"></div>

<!-- EXPORT -->
<div class="mt-6 bg-zinc-900 p-3 rounded-xl border border-orange-500/30">
<button onclick="copy()" class="w-full bg-orange-500 text-black font-bold py-2 rounded">📋 WEBSITE KE LIYE CODE COPY KARO</button>
<p class="text-[10px] text-gray-500 mt-2">Copy karke main website ke PRODUCTS me paste karna hai</p>
</div>

<script>
let products = JSON.parse(localStorage.getItem('bake_final')||'null') || [
{id:1,name:'Nagina Special Burger',price:39,category:'burgers',img:'https://images.unsplash.com/photo-1568909344668-6f14a07b56a0?w=200'},
{id:2,name:'Mumbai Cheese Blast',price:59,category:'burgers',img:'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=200'},
{id:3,name:'Tandoori Tadka Burger',price:59,category:'burgers',img:'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=200'},
{id:4,name:'Aloo Tikki Burger',price:39,category:'burgers',img:'https://images.unsplash.com/photo-1550547660-d9450f859349?w=200'},
{id:5,name:'Peri Peri Loaded',price:69,category:'burgers',img:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200'},
{id:6,name:'Cheese Burst',price:49,category:'burgers',img:'https://images.unsplash.com/photo-1568909344668-6f14a07b56a0?w=200'},
{id:7,name:'Margherita Pizza 7"',price:99,category:'pizzas',img:'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=200'},
{id:8,name:'Veg Cheese Pizza',price:129,category:'pizzas',img:'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200'},
{id:9,name:'Paneer Tikka Pizza',price:149,category:'pizzas',img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200'},
{id:10,name:'Chocolate Cake',price:299,category:'bakery',img:'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=200'},
{id:11,name:'Fresh Bread',price:40,category:'bakery',img:'https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=200'},
{id:12,name:'Donut',price:120,category:'bakery',img:'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=200'},
];

function save(){localStorage.setItem('bake_final',JSON.stringify(products));render();}
function render(){
let s=document.getElementById('search').value.toLowerCase();
let list=document.getElementById('list');
list.innerHTML='';
products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
let realIndex = products.indexOf(p);
list.innerHTML+=`<div class="flex items-center justify-between bg-zinc-900 p-3 mb-2 rounded-xl border border-zinc-800">
<div class="flex items-center gap-3">
<img src="${p.img}" class="w-14 h-14 rounded-lg object-cover">
<div><div class="font-bold text-sm">${p.name}</div><div class="text-xs text-orange-400">₹${p.price} - ${p.category}</div></div>
</div>
<div class="flex gap-1">
<button onclick="edit(${realIndex})" class="bg-zinc-700 px-3 py-1 rounded text-xs">EDIT</button>
<button onclick="if(confirm('Delete ${p.name}?')){products.splice(${realIndex},1);save()}" class="bg-red-600 px-3 py-1 rounded text-xs">DELETE</button>
</div>
</div>`;
});
}
function add(){
let name=document.getElementById('n').value;
let price=document.getElementById('pr').value;
let cat=document.getElementById('cat').value;
let img=document.getElementById('img').value || 'https://images.unsplash.com/photo-1568909344668-6f14a07b56a0?w=200';
if(!name||!price) return alert('Name Price bharo');
products.push({id:Date.now(),name,price:parseInt(price),category:cat,img});
save();
document.getElementById('n').value='';document.getElementById('pr').value='';document.getElementById('img').value='';
}
function keepOnlyBurgerPizza(){
if(confirm('Sirf Burger Pizza rakhna hai? Bakery sab delete ho jayega!')){
products=products.filter(p=>p.category==='burgers'||p.category==='pizzas');
save();
alert('Ho gaya! Ab sirf Burger Pizza bache hain');
}
}
function edit(idx){
let newName=prompt('Naya Naam:',products[idx].name);
if(newName) products[idx].name=newName;
let newPrice=prompt('Naya Price:',products[idx].price);
if(newPrice) products[idx].price=parseInt(newPrice);
save();
}
function copy(){
let code=JSON.stringify(products,null,2);
navigator.clipboard.writeText(code);
alert('Code Copy Ho Gaya! Ab main website me paste kar do');
}
render();
</script>
</body>
</html>
